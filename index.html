<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    :root {
        --bg-dark: #1A1B26;
        --card-dark: #24273A;
        --accent-cyan: #00E5FF;
        --accent-yellow: #FFC400;
        --accent-red: #FF5252;
        --text-main: #CDD6F4;
        --text-dim: #A9B1D6;
        --border-dark: #363A4F;
    }

    * {
        font-family: 'Inter', sans-serif;
    }

    body {
        background: var(--bg-dark);
        color: var(--text-main);
    }

    .glass {
        background: var(--card-dark);
        border: 1px solid var(--border-dark);
        border-radius: 20px;
        backdrop-filter: blur(12px);
    }

    .btn-gradient {
        background: linear-gradient(135deg, #7C3AED 0%, #3B82F6 100%);
        transition: all 0.3s ease;
    }

    .btn-gradient:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
    }

    .btn-gradient:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .btn-danger {
        background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
    }

    .btn-danger:hover:not(:disabled) {
        box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4);
    }

    .status-lancar {
        color: var(--accent-cyan);
        background: rgba(0, 229, 255, 0.1);
    }

    .status-cors {
        color: var(--accent-yellow);
        background: rgba(255, 196, 0, 0.1);
    }

    .status-mati {
        color: var(--accent-red);
        background: rgba(255, 82, 82, 0.1);
    }

    .progress-lancar { background: var(--accent-cyan); }
    .progress-cors { background: var(--accent-yellow); }
    .progress-mati { background: var(--accent-red); }

    .table-row {
        border-bottom: 1px solid var(--border-dark);
        transition: background 0.2s ease;
    }

    .table-row:hover {
        background: rgba(54, 58, 79, 0.3);
    }

    .table-row:last-child {
        border-bottom: none;
    }

    input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--accent-cyan);
        cursor: pointer;
        box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
    }

    input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--accent-cyan);
        cursor: pointer;
        border: none;
        box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
    }

    .toggle-bg:after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        background: white;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        transition: 0.3s;
    }

    input:checked + .toggle-bg:after {
        transform: translateX(24px);
    }

    input:checked + .toggle-bg {
        background: var(--accent-cyan);
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }

    .animate-pulse-slow {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .scrollbar-custom::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }

    .scrollbar-custom::-webkit-scrollbar-track {
        background: var(--bg-dark);
    }

    .scrollbar-custom::-webkit-scrollbar-thumb {
        background: var(--border-dark);
        border-radius: 4px;
    }

    .scrollbar-custom::-webkit-scrollbar-thumb:hover {
        background: #4A4F6A;

<body class="min-h-screen p-3 md:p-6">
    <div class="max-w-7xl mx-auto">

            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

                    <div>
                        <h1 class="text-2xl md:text-3xl font-bold text-white">M3U IPTV Checker Pro</h1>
                        <p class="text-sm text-[#A9B1D6]">v2.8.3 FINAL - Theme Match • Export Fix</p>
                    </div>
                </div>
                <div id="proxyBadge" class="hidden px-4 py-2 rounded-full status-cors text-sm font-semibold self-start md:self-auto">
                    PROXY ON

            </div>
        </div>

        <!-- Controls -->
        <div class="glass p-4 md:p-6 mb-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Left Column -->

                    <div>

                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2 text-[#CDD6F4]">Atau Paste URL M3U</label>
                        <input type="text" id="urlInput" placeholder="https://example.com/playlist.m3u" 
                            class="w-full px-4 py-2.5 bg-[#1A1B26] border border-[#363A4F] rounded-lg text-[#CDD6F4] placeholder-[#6B7280] focus:outline-none focus:border-[#00E5FF] transition">
                    </div>

                    <div class="flex items-center justify-between">
                        <span class="text-sm font-medium text-[#CDD6F4]">Proxy Mode</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="proxyToggle" class="sr-only peer">
                            <div class="toggle-bg w-12 h-6 bg-[#363A4F] rounded-full peer transition relative"></div>
                        </label>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="space-y-4">
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <label class="text-sm font-medium text-[#CDD6F4]">Concurrent Threads</label>
                            <span id="threadValue" class="text-sm font-semibold text-[#00E5FF]">50</span>
                        </div>
                        <input type="range" id="threadSlider" min="10" max="1000" value="50" step="10" 
                            class="w-full h-2 bg-[#363A4F] rounded-lg appearance-none cursor-pointer">
                        <div class="flex justify-between text-xs text-[#6B7280] mt-1">
                            <span>10</span>
                            <span>1000</span>
                        </div>
                    </div>

                    <div class="space-y-3 pt-2">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="exportOnlyLancar" class="w-4 h-4 rounded border-[#363A4F] bg-[#1A1B26] text-[#00E5FF] focus:ring-[#00E5FF] focus:ring-offset-0">
                            <span class="text-sm text-[#CDD6F4]">Export hanya Lancar</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="markDeadChannel" class="w-4 h-4 rounded border-[#363A4F] bg-[#1A1B26] text-[#00E5FF] focus:ring-[#00E5FF] focus:ring-offset-0">
                            <span class="text-sm text-[#CDD6F4]">🔴 Tandai channel Mati</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 mt-6">
                <button id="startBtn" class="btn-gradient text-white font-semibold px-6 py-3 rounded-lg flex-1 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Mulai Check
                </button>
                <button id="stopBtn" class="btn-gradient btn-danger text-white font-semibold px-6 py-3 rounded-lg flex-1 flex items-center justify-center gap-2" disabled>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
                    Stop
                </button>
                <button id="exportBtn" class="btn-gradient text-white font-semibold px-6 py-3 rounded-lg flex-1 flex items-center justify-center gap-2" disabled>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Export M3U
                </button>
            </div>
        </div>

        <!-- Progress -->
        <div id="progressSection" class="glass p-4 md:p-6 mb-6 hidden">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-lg font-semibold text-white">Progress</h3>
                <span id="progressText" class="text-sm text-[#A9B1D6]">0 / 0</span>
            </div>
            <div class="w-full h-3 bg-[#1A1B26] rounded-full overflow-hidden flex">
                <div id="progressLancar" class="progress-lancar h-full transition-all duration-300" style="width: 0%"></div>
                <div id="progressCors" class="progress-cors h-full transition-all duration-300" style="width: 0%"></div>
                <div id="progressMati" class="progress-mati h-full transition-all duration-300" style="width: 0%"></div>
            </div>

                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full progress-lancar"></div>
                    <span class="text-[#A9B1D6]">Lancar: <span id="countLancar" class="font-semibold text-[#00E5FF]">0</span></span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full progress-cors"></div>
                    <span class="text-[#A9B1D6]">CORS: <span id="countCors" class="font-semibold text-[#FFC400]">0</span></span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full progress-mati"></div>
                    <span class="text-[#A9B1D6]">Mati: <span id="countMati" class="font-semibold text-[#FF5252]">0</span></span>
                </div>
            </div>
        </div>

        <!-- Results Table -->
        <div id="resultsSection" class="glass p-4 md:p-6 hidden">
            <h3 class="text-lg font-semibold text-white mb-4">Hasil Check</h3>
            <div class="overflow-x-auto scrollbar-custom">
                <table class="w-full">
                    <thead>
                        <tr class="text-left text-sm text-[#A9B1D6] border-b border-[#363A4F]">
                            <th class="pb-3 pr-4 font-semibold">No</th>
                            <th class="pb-3 pr-4 font-semibold">Nama Channel</th>
                            <th class="pb-3 pr-4 font-semibold">Status</th>
                            <th class="pb-3 pr-4 font-semibold">Response</th>
                            <th class="pb-3 font-semibold">URL</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody" class="text-sm">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

<script>
const CORS_PROXIES = [
    'https://corsproxy.io/?',
    'https://api.allorigins.win/raw?url=',
    'https://proxy.cors.sh/'
];

let channels = [];
let results = [];
let isChecking = false;
let abortController = null;
let stats = { lancar: 0, cors: 0, mati: 0, total: 0 };

const fileInput = document.getElementById('fileInput');
const urlInput = document.getElementById('urlInput');
const proxyToggle = document.getElementById('proxyToggle');
const proxyBadge = document.getElementById('proxyBadge');
const threadSlider = document.getElementById('threadSlider');
const threadValue = document.getElementById('threadValue');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const exportBtn = document.getElementById('exportBtn');
const progressSection = document.getElementById('progressSection');
const resultsSection = document.getElementById('resultsSection');
const resultsBody = document.getElementById('resultsBody');

// Thread slider
threadSlider.addEventListener('input', (e) => {
    threadValue.textContent = e.target.value;
});

// Proxy toggle
proxyToggle.addEventListener('change', (e) => {
    proxyBadge.classList.toggle('hidden', !e.target.checked);
});

// Parse M3U content
function parseM3U(content) {
    const lines = content.split('\n');
    const parsed = [];
    let currentExtinf = '';
    
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('#EXTINF:')) {
            currentExtinf = line;
        } else if (line && !line.startsWith('#')) {
            const nameMatch = currentExtinf.match(/,(.+)$/);
            const name = nameMatch ? nameMatch[1].trim() : 'Unknown';
            parsed.push({
                name: name,
                url: line,
                extinf: currentExtinf,
                rawExtinf: currentExtinf
            });
            currentExtinf = '';
        }
    }
    return parsed;
}

// Check single channel
async function checkChannel(channel, signal, useProxy) {
    const startTime = Date.now();
    let urls = useProxy ? CORS_PROXIES.map(p => p + encodeURIComponent(channel.url)) : [channel.url];
    
    for (const testUrl of urls) {
        try {
            if (signal.aborted) throw new DOMException('Aborted', 'AbortError');
            
            // Try HLS.js first for m3u8
            if (channel.url.includes('.m3u8')) {
                const result = await checkHLS(testUrl, signal);
                if (result.success) {
                    return {
                        status: result.cors ? 'CORS' : 'Lancar',
                        response: Date.now() - startTime,
                        cors: result.cors
                    };
                }
            }
            
            // Fallback to fetch
            const response = await fetch(testUrl, { 
                method: 'HEAD', 
                signal,
                mode: useProxy ? 'cors' : 'no-cors'
            });
            
            return {
                status: useProxy ? 'CORS' : 'Lancar',
                response: Date.now() - startTime,
                cors: useProxy
            };
        } catch (error) {
            if (error.name === 'AbortError') throw error;
            continue;
        }
    }
    
    return {
        status: 'Mati',
        response: Date.now() - startTime,
        cors: false
    };
}

// Check HLS with timeout
function checkHLS(url, signal) {
    return new Promise((resolve) => {
        const hls = new Hls({ 
            debug: false,
            manifestLoadingTimeOut: 8000,
            manifestLoadingMaxRetry: 1
        });
        const timeout = setTimeout(() => {
            hls.destroy();
            resolve({ success: false });
        }, 10000);
        
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            clearTimeout(timeout);
            hls.destroy();
            resolve({ success: true, cors: url.includes('corsproxy') || url.includes('allorigins') });
        });
        
        hls.on(Hls.Events.ERROR, (event, data) => {
            clearTimeout(timeout);
            hls.destroy();
            resolve({ success: false });
        });
        
        hls.loadSource(url);
        
        signal.addEventListener('abort', () => {
            clearTimeout(timeout);
            hls.destroy();
            resolve({ success: false });
        });
    });
}

// Batch processing with concurrency
async function processChannels() {
    const useProxy = proxyToggle.checked;
    const concurrency = parseInt(threadSlider.value);
    const queue = [...channels];
    results = [];
    stats = { lancar: 0, cors: 0, mati: 0, total: channels.length };
    
    updateProgress();
    resultsSection.classList.remove('hidden');
    resultsBody.innerHTML = '';
    
    const workers = Array(concurrency).fill(null).map(async () => {
        while (queue.length > 0 && !abortController.signal.aborted) {
            const channel = queue.shift();
            const index = channels.indexOf(channel);
            
            try {
                const result = await checkChannel(channel, abortController.signal, useProxy);
                stats[result.status.toLowerCase()]++;
                
                results[index] = {
                    ...channel,
                    ...result
                };
                
                addResultRow(index + 1, results[index]);
                updateProgress();
            } catch (error) {
                if (error.name === 'AbortError') break;
            }
        }
    });
    
    await Promise.all(workers);
}

// Add row to table
function addResultRow(num, result) {
    const row = document.createElement('tr');
    row.className = 'table-row';
    
    const statusClass = result.status === 'Lancar' ? 'status-lancar' : 
                       result.status === 'CORS' ? 'status-cors' : 'status-mati';
    
    row.innerHTML = `
        <td class="py-3 pr-4 text-[#A9B1D6]">${num}</td>
        <td class="py-3 pr-4 text-[#CDD6F4] font-medium">${result.name}</td>
        <td class="py-3 pr-4">
            <span class="px-3 py-1 rounded-full text-xs font-semibold ${statusClass}">${result.status}</span>
        </td>
        <td class="py-3 pr-4 text-[#A9B1D6]">${result.response}ms</td>
        <td class="py-3 pr-4 text-[#6B7280] text-xs truncate max-w-xs">${result.url}</td>
    `;
    
    resultsBody.appendChild(row);
}

// Update progress bar
function updateProgress() {
    const checked = stats.lancar + stats.cors + stats.mati;
    const lancarPercent = (stats.lancar / stats.total) * 100;
    const corsPercent = (stats.cors / stats.total) * 100;
    const matiPercent = (stats.mati / stats.total) * 100;
    
    document.getElementById('progressLancar').style.width = lancarPercent + '%';
    document.getElementById('progressCors').style.width = corsPercent + '%';
    document.getElementById('progressMati').style.width = matiPercent + '%';
    
    document.getElementById('progressText').textContent = `${checked} / ${stats.total}`;
    document.getElementById('countLancar').textContent = stats.lancar;
    document.getElementById('countCors').textContent = stats.cors;
    document.getElementById('countMati').textContent = stats.mati;
}

// Start checking
startBtn.addEventListener('click', async () => {
    let content = '';
    
    if (fileInput.files[0]) {
        content = await fileInput.files[0].text();
    } else if (urlInput.value.trim()) {
        try {
            const response = await fetch(urlInput.value.trim());
            content = await response.text();
        } catch (error) {
            alert('Gagal load URL: ' + error.message);
            return;
        }
    } else {
        alert('Pilih file M3U atau masukkan URL terlebih dahulu');
        return;
    }
    
    channels = parseM3U(content);
    if (channels.length === 0) {
        alert('Tidak ada channel ditemukan di M3U');
        return;
    }
    
    isChecking = true;
    abortController = new AbortController();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    exportBtn.disabled = true;
    progressSection.classList.remove('hidden');
    
    await processChannels();
    
    isChecking = false;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    exportBtn.disabled = false;
});

// Stop checking
stopBtn.addEventListener('click', () => {
    if (abortController) {
        abortController.abort();
    }
});

// Export M3U - FIXED: Symbol 🔴 di depan #EXTINF
exportBtn.addEventListener('click', () => {
    const exportOnlyLancar = document.getElementById('exportOnlyLancar').checked;
    const markDead = document.getElementById('markDeadChannel').checked;
    
    let output = '#EXTM3U\n';
    
    results.forEach(result => {
        if (!result) return;
        
        // Filter: export hanya lancar
        if (exportOnlyLancar && result.status !== 'Lancar') return;
        
        let extinfLine = result.rawExtinf || result.extinf;
        let exportLine;
        
        // FIX: Simbol 🔴 di DEPAN #EXTINF, bukan di belakang koma
        if (markDead && result.status === 'Mati') {
            // Logic: if (checked && status==='Mati') exportLine = '🔴' + extinfLine
            exportLine = '🔴' + extinfLine;
        } else {
            exportLine = extinfLine;
        }
        
        output += exportLine + '\n' + result.url + '\n';
    });
    
    const blob = new Blob([output], { type: 'audio/x-mpegurl' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `playlist_checked_${Date.now()}.m3u`;
    a.click();
    URL.revokeObjectURL(url);
});
</script>
