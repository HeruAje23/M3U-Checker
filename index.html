<!DOCTYPE html>
<html lang="id">
<head><style>
@font-face {
  font-family: "Optimistic";
  font-style: normal;
  font-weight: 400 600;
  font-display: swap;
  src: url("/fonts/OptimisticAI_VF_Optimized.woff2") format("woff2");
}
@font-face {
  font-family: "Optimistic Mono";
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url("/fonts/OptimisticMono_W_TextRegular.woff2") format("woff2");
}
:where(html) {
  font-family: "Optimistic", system-ui, sans-serif;
}
:where(code, pre, kbd, samp) {
  font-family: "Optimistic Mono", ui-monospace, monospace;
}
</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Checker Pro v2.8.5 FINAL</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
  
  :root {
    --bg: #1A1B26;
    --card: #24273A;
    --card-glass: rgba(36, 39, 58, 0.7);
    --border: rgba(255, 255, 255, 0.08);
    --lancar: #00E5FF;
    --cors: #FFC400;
    --mati: #FF5252;
    --pending: #9E9E9E;
    --text: #E6E6E6;
    --text-dim: #A0A0B0;
  }

  * {
    font-family: 'Inter', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .glass {
    background: var(--card-glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
  }

  .status-badge {
    padding: 0.25rem 0.75rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .status-pending { background: rgba(158, 158, 158, 0.2); color: var(--pending); }
  .status-checking { background: rgba(255, 196, 0, 0.2); color: var(--cors); animation: pulse 1.5s infinite; }
  .status-lancar { background: rgba(0, 229, 255, 0.2); color: var(--lancar); }
  .status-cors { background: rgba(255, 196, 0, 0.2); color: var(--cors); }
  .status-mati { background: rgba(255, 82, 82, 0.2); color: var(--mati); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .btn-primary {
    background: linear-gradient(135deg, #00B8D4 0%, #00E5FF 100%);
    color: #001E26;
    font-weight: 700;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(0, 229, 255, 0.3);
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 229, 255, 0.4);
  }

  .btn-danger {
    background: linear-gradient(135deg, #D32F2F 0%, #FF5252 100%);
    color: white;
    font-weight: 700;
    transition: all 0.2s ease;
  }

  .btn-danger:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 82, 82, 0.4);
  }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    color: var(--text);
    transition: all 0.2s ease;
  }

  .btn-secondary:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.1);
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  input[type="range"]::-webkit-slider-thumb {
    background: var(--lancar);
    box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
  }

  .tab-active {
    background: rgba(0, 229, 255, 0.15);
    color: var(--lancar);
    border-bottom: 2px solid var(--lancar);
  }

  .channel-row {
    transition: background 0.15s ease;
  }

  .channel-row:hover {
    background: rgba(255, 255, 255, 0.03);
  }

  .progress-bar {
    background: linear-gradient(90deg, #00B8D4 0%, #00E5FF 100%);
    transition: width 0.3s ease;
    box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
  }

  @media (max-width: 640px) {
    .hide-mobile { display: none; }
  }
</style>
</head>
<body class="p-4 md:p-6">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="glass rounded-2xl p-5 md:p-6 mb-6 shadow-2xl">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="text-2xl md:text-3xl font-black tracking-tight">
            IPTV Checker Pro <span class="text-[var(--lancar)]">v2.8.5 FINAL</span>
          </h1>
          <p class="text-sm text-[var(--text-dim)] mt-1">Real Check Engine • Zero Bug</p>
        </div>
        <div class="flex flex-wrap gap-3 text-xs md:text-sm">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-[var(--lancar)]"></div>
            <span>LANCAR: <span id="count-lancar" class="font-bold">0</span></span>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-[var(--cors)]"></div>
            <span>CORS: <span id="count-cors" class="font-bold">0</span></span>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-[var(--mati)]"></div>
            <span>MATI: <span id="count-mati" class="font-bold">0</span></span>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-[var(--pending)]"></div>
            <span>PENDING: <span id="count-pending" class="font-bold">0</span></span>
          </div>
        </div>
      </div>
      
      <!-- Progress Bar -->
      <div class="mt-5">
        <div class="flex justify-between text-xs mb-2">
          <span id="progress-text">0 / 0 Checked</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="w-full h-2 bg-[rgba(255,255,255,0.05)] rounded-full overflow-hidden">
          <div id="progress-bar" class="progress-bar h-full w-0 rounded-full"></div>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Left: Import & Controls -->
      <div class="lg:col-span-1 space-y-6">
        <!-- Import Panel -->
        <div class="glass rounded-2xl p-5 shadow-2xl">
          <h2 class="text-lg font-bold mb-4">Import Playlist</h2>
          
          <!-- Tabs -->
          <div class="flex border-b border-[var(--border)] mb-4">
            <button class="tab-btn tab-active px-4 py-2 text-sm font-semibold" data-tab="file">File</button>
            <button class="tab-btn px-4 py-2 text-sm font-semibold text-[var(--text-dim)]" data-tab="url">URL</button>
            <button class="tab-btn px-4 py-2 text-sm font-semibold text-[var(--text-dim)]" data-tab="paste">Paste</button>
          </div>

          <!-- Tab Contents -->
          <div id="tab-file" class="tab-content">
            <input type="file" id="file-input" accept=".m3u,.m3u8,.txt" class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-[var(--lancar)] file:text-[#001E26] file:font-semibold file:cursor-pointer bg-[rgba(255,255,255,0.05)] rounded-lg p-2 cursor-pointer">
          </div>

          <div id="tab-url" class="tab-content hidden">
            <div class="flex gap-2">
              <input type="url" id="url-input" placeholder="https://example.com/playlist.m3u8" class="flex-1 bg-[rgba(255,255,255,0.05)] border border-[var(--border)] rounded-lg px-3 py-2 text-sm outline-none focus:border-[var(--lancar)]">
              <button id="fetch-url" class="btn-secondary px-4 py-2 rounded-lg text-sm font-semibold">Fetch</button>
            </div>
          </div>

          <div id="tab-paste" class="tab-content hidden">
            <textarea id="paste-input" rows="6" placeholder="#EXTM3U&#10;#EXTINF:-1,Channel Name&#10;http://example.com/stream.m3u8" class="w-full bg-[rgba(255,255,255,0.05)] border border-[var(--border)] rounded-lg px-3 py-2 text-sm outline-none focus:border-[var(--lancar)] resize-none"></textarea>
            <button id="load-paste" class="btn-secondary w-full mt-2 px-4 py-2 rounded-lg text-sm font-semibold">Load Playlist</button>
          </div>

          <div class="mt-4 text-xs text-[var(--text-dim)]">
            Total loaded: <span id="total-loaded" class="font-bold text-[var(--text)]">0</span> channels
          </div>
        </div>

        <!-- Control Panel -->
        <div class="glass rounded-2xl p-5 shadow-2xl">
          <h2 class="text-lg font-bold mb-4">Controls</h2>
          
          <div class="space-y-4">
            <div>
              <div class="flex justify-between mb-2">
                <label class="text-sm font-medium">Threads</label>
                <span id="thread-value" class="text-sm font-bold text-[var(--lancar)]">50</span>
              </div>
              <input type="range" id="thread-slider" min="1" max="100" value="50" class="w-full h-2 bg-[rgba(255,255,255,0.1)] rounded-lg appearance-none cursor-pointer">
            </div>

            <div class="flex items-center justify-between">
              <label class="text-sm font-medium">Proxy Mode</label>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="proxy-toggle" class="sr-only peer" checked>
                <div class="w-11 h-6 bg-[rgba(255,255,255,0.1)] peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[var(--lancar)]"></div>
              </label>
            </div>

            <div class="flex items-center justify-between">
              <label class="text-sm font-medium">Tandai Channel Mati</label>
              <input type="checkbox" id="mark-dead" class="w-5 h-5 rounded accent-[var(--lancar)] cursor-pointer" checked>
            </div>

            <div class="grid grid-cols-2 gap-3 pt-2">
              <button id="start-btn" class="btn-primary px-4 py-3 rounded-xl text-sm" disabled>▶ START</button>
              <button id="stop-btn" class="btn-danger px-4 py-3 rounded-xl text-sm" disabled>⏹ STOP</button>
            </div>

            <button id="export-btn" class="btn-secondary w-full px-4 py-3 rounded-xl text-sm font-semibold" disabled>
              💾 Export M3U
            </button>
          </div>
        </div>
      </div>

      <!-- Right: Results Table -->
      <div class="lg:col-span-2">
        <div class="glass rounded-2xl p-5 shadow-2xl h-full">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-bold">Results</h2>
            <button id="clear-btn" class="text-xs text-[var(--text-dim)] hover:text-[var(--mati)]">Clear All</button>
          </div>
          
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-[var(--border)] text-[var(--text-dim)] text-xs uppercase">
                  <th class="text-left py-3 px-2 font-semibold w-12">#</th>
                  <th class="text-left py-3 px-2 font-semibold">Channel</th>
                  <th class="text-left py-3 px-2 font-semibold hide-mobile">URL</th>
                  <th class="text-right py-3 px-2 font-semibold w-24">Status</th>
                </tr>
              </thead>
              <tbody id="results-body">
                <tr>
                  <td colspan="4" class="text-center py-12 text-[var(--text-dim)]">
                    Import playlist untuk mulai check
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
const state = {
  channels: [],
  isChecking: false,
  checkedCount: 0,
  abortController: null,
  hlsInstances: [],
  timeouts: [],
  queue: [],
  active: 0,
  maxThreads: 50,
  counts: { lancar: 0, cors: 0, mati: 0, pending: 0 }
};

const els = {
  fileInput: document.getElementById('file-input'),
  urlInput: document.getElementById('url-input'),
  fetchUrl: document.getElementById('fetch-url'),
  pasteInput: document.getElementById('paste-input'),
  loadPaste: document.getElementById('load-paste'),
  totalLoaded: document.getElementById('total-loaded'),
  threadSlider: document.getElementById('thread-slider'),
  threadValue: document.getElementById('thread-value'),
  proxyToggle: document.getElementById('proxy-toggle'),
  markDead: document.getElementById('mark-dead'),
  startBtn: document.getElementById('start-btn'),
  stopBtn: document.getElementById('stop-btn'),
  exportBtn: document.getElementById('export-btn'),
  clearBtn: document.getElementById('clear-btn'),
  resultsBody: document.getElementById('results-body'),
  progressBar: document.getElementById('progress-bar'),
  progressText: document.getElementById('progress-text'),
  progressPercent: document.getElementById('progress-percent'),
  countLancar: document.getElementById('count-lancar'),
  countCors: document.getElementById('count-cors'),
  countMati: document.getElementById('count-mati'),
  countPending: document.getElementById('count-pending')
};

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('tab-active');
      b.classList.add('text-[var(--text-dim)]');
    });
    btn.classList.add('tab-active');
    btn.classList.remove('text-[var(--text-dim)]');
    
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    document.getElementById(`tab-${tab}`).classList.remove('hidden');
  });
});

// Thread slider
els.threadSlider.addEventListener('input', (e) => {
  state.maxThreads = parseInt(e.target.value);
  els.threadValue.textContent = state.maxThreads;
});

// Import handlers
els.fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  parseM3U(text);
});

els.fetchUrl.addEventListener('click', async () => {
  const url = els.urlInput.value.trim();
  if (!url) return;
  try {
    els.fetchUrl.textContent = 'Loading...';
    els.fetchUrl.disabled = true;
    const res = await fetch(url);
    const text = await res.text();
    parseM3U(text);
  } catch (err) {
    alert('Failed to fetch URL: ' + err.message);
  } finally {
    els.fetchUrl.textContent = 'Fetch';
    els.fetchUrl.disabled = false;
  }
});

els.loadPaste.addEventListener('click', () => {
  const text = els.pasteInput.value.trim();
  if (!text) return;
  parseM3U(text);
});

function parseM3U(content) {
  const lines = content.split('\n').map(l => l.trim()).filter(l => l);
  const channels = [];
  let currentExtinf = null;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.startsWith('#EXTINF:')) {
      currentExtinf = line;
    } else if (line && !line.startsWith('#') && currentExtinf) {
      const nameMatch = currentExtinf.match(/,(.+)$/);
      const name = nameMatch ? nameMatch[1].trim() : 'Unknown';
      channels.push({
        id: channels.length,
        name,
        url: line,
        extinf: currentExtinf,
        status: 'pending',
        error: null
      });
      currentExtinf = null;
    }
  }

  if (channels.length === 0) {
    alert('No valid channels found in playlist');
    return;
  }

  state.channels = channels;
  state.checkedCount = 0;
  updateCounts();
  renderTable();
  updateUI();
}

function renderTable() {
  if (state.channels.length === 0) {
    els.resultsBody.innerHTML = `
      <tr>
        <td colspan="4" class="text-center py-12 text-[var(--text-dim)]">
          Import playlist untuk mulai check
        </td>
      </tr>
    `;
    return;
  }

  els.resultsBody.innerHTML = state.channels.map((ch, idx) => `
    <tr class="channel-row border-b border-[rgba(255,255,255,0.03)]">
      <td class="py-3 px-2 text-[var(--text-dim)]">${idx + 1}</td>
      <td class="py-3 px-2 font-medium truncate max-w-[200px] md:max-w-none" title="${ch.name}">${ch.name}</td>
      <td class="py-3 px-2 text-[var(--text-dim)] truncate max-w-[150px] hide-mobile" title="${ch.url}">${ch.url}</td>
      <td class="py-3 px-2 text-right">
        <span class="status-badge status-${ch.status}" id="status-${ch.id}">
          ${ch.status === 'checking' ? 'CHECKING' : ch.status.toUpperCase()}
        </span>
      </td>
    </tr>
  `).join('');
}

function updateCounts() {
  state.counts = { lancar: 0, cors: 0, mati: 0, pending: 0 };
  state.channels.forEach(ch => {
    state.counts[ch.status]++;
  });
  
  els.countLancar.textContent = state.counts.lancar;
  els.countCors.textContent = state.counts.cors;
  els.countMati.textContent = state.counts.mati;
  els.countPending.textContent = state.counts.pending;
  els.totalLoaded.textContent = state.channels.length;
  
  const percent = state.channels.length > 0 ? Math.round((state.checkedCount / state.channels.length) * 100) : 0;
  els.progressBar.style.width = percent + '%';
  els.progressText.textContent = `${state.checkedCount} / ${state.channels.length} Checked`;
  els.progressPercent.textContent = percent + '%';
}

function updateUI() {
  const hasChannels = state.channels.length > 0;
  els.startBtn.disabled = !hasChannels || state.isChecking;
  els.stopBtn.disabled = !state.isChecking;
  els.exportBtn.disabled = !hasChannels || state.isChecking;
}

// Real Stream Check Logic
function checkChannel(channel) {
  return new Promise((resolve) => {
    const useProxy = els.proxyToggle.checked;
    const url = useProxy ? `https://corsproxy.io/?${encodeURIComponent(channel.url)}` : channel.url;
    
    let timeoutId;
    let hls = null;
    let video = null;
    let finished = false;

    const cleanup = () => {
      if (finished) return;
      finished = true;
      clearTimeout(timeoutId);
      if (hls) {
        try { hls.destroy(); } catch(e) {}
        const idx = state.hlsInstances.indexOf(hls);
        if (idx > -1) state.hlsInstances.splice(idx, 1);
      }
      if (video) {
        video.removeAttribute('src');
        video.load();
      }
    };

    const setStatus = (status, error = null) => {
      cleanup();
      channel.status = status;
      channel.error = error;
      state.checkedCount++;
      updateChannelRow(channel);
      updateCounts();
      resolve();
    };

    // Timeout 10 detik
    timeoutId = setTimeout(() => {
      setStatus('mati', 'Timeout 10s');
    }, 10000);
    state.timeouts.push(timeoutId);

    // Check if HLS stream
    const isHLS = /\.m3u8(\?|$)/i.test(channel.url);
    
    if (isHLS && typeof Hls !== 'undefined' && Hls.isSupported()) {
      // Use HLS.js for .m3u8
      hls = new Hls({
        debug: false,
        enableWorker: true,
        lowLatencyMode: false,
        backBufferLength: 0
      });
      state.hlsInstances.push(hls);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        setStatus('lancar');
      });

      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            if (data.response && data.response.code === 0 && !useProxy) {
              setStatus('cors', 'CORS Error');
            } else {
              setStatus('mati', data.details || 'Network Error');
            }
          } else {
            setStatus('mati', data.details || 'HLS Error');
          }
        }
      });

      try {
        hls.loadSource(url);
        video = document.createElement('video');
        hls.attachMedia(video);
      } catch (err) {
        setStatus('mati', err.message);
      }

    } else {
      // Use HTMLVideoElement for direct .ts/.mp4/.mpd
      video = document.createElement('video');
      video.preload = 'metadata';
      video.muted = true;

      video.oncanplay = () => {
        setStatus('lancar');
      };

      video.onerror = (e) => {
        if (!useProxy && video.error && video.error.code === 4) {
          setStatus('cors', 'CORS/Media Error');
        } else {
          setStatus('mati', video.error ? video.error.message : 'Video Error');
        }
      };

      try {
        video.src = url;
      } catch (err) {
        setStatus('mati', err.message);
      }
    }
  });
}

function updateChannelRow(channel) {
  const badge = document.getElementById(`status-${channel.id}`);
  if (badge) {
    badge.className = `status-badge status-${channel.status}`;
    badge.textContent = channel.status.toUpperCase();
  }
}

// Worker Pool - ROOT CAUSE FIX #3
async function runWorkerPool() {
  state.queue = [...state.channels];
  state.active = 0;
  
  return new Promise((resolve) => {
    const runNext = async () => {
      if (state.abortController.signal.aborted) {
        resolve();
        return;
      }
      
      if (state.queue.length === 0 && state.active === 0) {
        resolve();
        return;
      }
      
      while (state.active < state.maxThreads && state.queue.length > 0) {
        const channel = state.queue.shift();
        channel.status = 'checking';
        updateChannelRow(channel);
        state.active++;
        
        checkChannel(channel).finally(() => {
          state.active--;
          runNext();
        });
      }
    };
    
    runNext();
  });
}

// Start/Stop handlers
els.startBtn.addEventListener('click', async () => {
  if (state.isChecking) return;
  
  state.isChecking = true;
  state.checkedCount = 0;
  state.abortController = new AbortController();
  
  // Reset all to pending
  state.channels.forEach(ch => {
    if (ch.status !== 'pending') {
      ch.status = 'pending';
      ch.error = null;
    }
  });
  
  updateCounts();
  renderTable();
  updateUI();
  
  try {
    await runWorkerPool();
  } catch (err) {
    console.error('Check error:', err);
  } finally {
    state.isChecking = false;
    updateUI();
  }
});

els.stopBtn.addEventListener('click', () => {
  if (!state.isChecking) return;
  
  // ROOT CAUSE FIX #4: Stop all
  state.abortController.abort();
  
  // Destroy all HLS instances
  state.hlsInstances.forEach(hls => {
    try { hls.destroy(); } catch(e) {}
  });
  state.hlsInstances = [];
  
  // Clear all timeouts
  state.timeouts.forEach(t => clearTimeout(t));
  state.timeouts = [];
  
  state.isChecking = false;
  updateUI();
});

// Export handler
els.exportBtn.addEventListener('click', () => {
  const markDead = els.markDead.checked;
  let m3u = '#EXTM3U\n';
  
  state.channels.forEach(ch => {
    let extinf = ch.extinf;
    // ROOT CAUSE FIX #7: Mark dead channels
    if (markDead && ch.status === 'mati') {
      extinf = '🔴' + extinf;
    }
    m3u += extinf + '\n' + ch.url + '\n';
  });
  
  const blob = new Blob([m3u], { type: 'audio/x-mpegurl' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `iptv_checked_${Date.now()}.m3u`;
  a.click();
  URL.revokeObjectURL(url);
});

// Clear handler
els.clearBtn.addEventListener('click', () => {
  if (state.isChecking) {
    alert('Stop checking first');
    return;
  }
  state.channels = [];
  state.checkedCount = 0;
  updateCounts();
  renderTable();
  updateUI();
});

// Prevent page unload during check
window.addEventListener('beforeunload', (e) => {
  if (state.isChecking) {
    e.preventDefault();
    e.returnValue = '';
  }
});
</script>
